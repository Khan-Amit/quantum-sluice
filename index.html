<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Sluice – Secure Node</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0f1e; font-family: 'Courier New', monospace; color: #e0e0e0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: #0f172a; border-radius: 24px; padding: 24px; border: 1px solid #1e293b; }
        h1 { color: #00f2fe; margin-bottom: 8px; font-size: 1.4rem; text-align: center; }
        .location { font-size: 1.1rem; color: #3b82f6; margin-bottom: 24px; text-align: center; font-weight: bold; }
        .flex { display: flex; flex-wrap: wrap; gap: 24px; align-items: center; justify-content: center; }
        .dial-box { flex: 1; min-width: 260px; text-align: center; }
        canvas { background: #010409; border-radius: 50%; width: 240px; height: 240px; border: 1px solid #1e293b; }
        .temp-value { font-size: 1.8rem; font-weight: bold; color: #00f2fe; margin-top: 12px; }
        .stats { flex: 2; min-width: 300px; display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 16px; }
        .stat-card { background: #010409; border-radius: 16px; padding: 16px; text-align: center; border: 1px solid #2d3748; }
        .stat-value { font-size: 1.8rem; font-weight: bold; color: #00f2fe; }
        .stat-label { font-size: 0.75rem; color: #94a3b8; margin-top: 8px; text-transform: uppercase; }
        .log { background: #010409; border-radius: 16px; padding: 16px; height: 220px; overflow-y: auto; font-family: monospace; font-size: 0.8rem; border: 1px solid #2d3748; margin: 24px 0; }
        .button-bar { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin: 20px 0; }
        button { border: none; padding: 12px 24px; border-radius: 40px; cursor: pointer; font-family: monospace; font-size: 0.9rem; font-weight: bold; transition: 0.2s; }
        .start { background: #00f2fe; color: #010409; }
        .test { background: #fbbf24; color: #010409; }
        .resume { background: #3b82f6; color: white; }
        .end { background: #ef4444; color: white; }
        .geo-btn { background: #10b981; color: white; width: 100%; margin-bottom: 15px; }
        footer { text-align: center; margin-top: 20px; font-size: 0.7rem; color: #475569; }
    </style>
</head>
<body>
<div class="container">
    <h1>⚡ Quantum Sluice – Telemetry Monitor</h1>
    <button id="geoBtn" class="geo-btn">🛰️ SYNC WITH PHONE GPS LOCATION</button>
    <div class="location" id="location">📍 Location: Standard Node Context Active</div>

    <div class="flex">
        <div class="dial-box">
            <canvas id="tempDial" width="240" height="240"></canvas>
            <div class="temp-value" id="currentTemp">-- °C</div>
        </div>
        <div class="stats">
            <div class="stat-card"><div class="stat-value" id="total">0</div><div class="stat-label">Total Packets</div></div>
            <div class="stat-card"><div class="stat-value" id="ripe">0</div><div class="stat-label">RIPE Samples</div></div>
            <div class="stat-card"><div class="stat-value" id="rejection">0%</div><div class="stat-label">Rejection Rate</div></div>
            <div class="stat-card"><div class="stat-value" id="energy">0 kWh</div><div class="stat-label">Power Offset</div></div>
        </div>
    </div>

    <div class="button-bar">
        <button id="startBtn" class="start">▶ START STREAM</button>
        <button id="testBtn" class="test">🔍 RUN TEST</button>
        <button id="resumeBtn" class="resume">⏸️ PAUSE</button>
        <button id="endBtn" class="end">⏹️ RESET SYSTEM</button>
    </div>

    <div class="log" id="log">Secure Data Link Online. Press START to query the server arrays.</div>
    <footer>Data Center Engine · Secured Telemetry Gateway</footer>
</div>

<script>
    // ----- Gauge Redraw Architecture -----
    const canvas = document.getElementById('tempDial');
    const ctx = canvas.getContext('2d');
    
    function drawDial(temp) {
        ctx.clearRect(0, 0, 240, 240);
        const cx = 120, cy = 120, radius = 90;
        const startAngle = -0.85 * Math.PI;
        const endAngle = 0.85 * Math.PI;
        
        ctx.beginPath();
        ctx.arc(cx, cy, radius, startAngle, endAngle);
        ctx.strokeStyle = '#1e293b';
        ctx.lineWidth = 14;
        ctx.stroke();
        
        // Maps climate variations (0C - 50C) safely onto your visual gauge arc
        let norm = Math.min(1, Math.max(0, (temp - 0) / 50)); 
        const angle = startAngle + norm * (endAngle - startAngle);
        
        ctx.beginPath();
        ctx.arc(cx, cy, radius, startAngle, angle);
        let gradient = ctx.createLinearGradient(40, 40, 200, 200);
        gradient.addColorStop(0, '#00f2fe');
        gradient.addColorStop(0.7, '#fbbf24');
        gradient.addColorStop(1, '#ef4444');
        ctx.strokeStyle = gradient;
        ctx.lineWidth = 14;
        ctx.stroke();
        
        // Render pointer vector lines
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + Math.cos(angle) * 75, cy + Math.sin(angle) * 75);
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 4;
        ctx.stroke();
    }

    // ----- Processing Array State Matrix -----
    let total = 0, ripeCount = 0;
    let streamInterval = null;
    let running = false;
    let lat = 13.7563, lon = 100.5018; // Safe server defaults

    const locationSpan = document.getElementById('location');
    const tempSpan = document.getElementById('currentTemp');
    const totalSpan = document.getElementById('total');
    const ripeSpan = document.getElementById('ripe');
    const rejectionSpan = document.getElementById('rejection');
    const energySpan = document.getElementById('energy');
    const logDiv = document.getElementById('log');

    function addLog(msg, status = "normal") {
        const p = document.createElement('div');
        let mark = "ℹ️ ";
        if (status === "ok") { p.style.color = "#10b981"; mark = "🎯 "; }
        if (status === "err") { p.style.color = "#ef4444"; mark = "❌ "; }
        p.textContent = `${new Date().toLocaleTimeString()} > ${mark}${msg}`;
        logDiv.appendChild(p);
        p.scrollIntoView({ behavior: 'smooth' });
    }

    // ----- GPS Telemetry Synchronization Hook -----
    document.getElementById('geoBtn').onclick = () => {
        if (navigator.geolocation) {
            locationSpan.textContent = "📡 Connecting with mobile GPS satellites...";
            navigator.geolocation.getCurrentPosition((pos) => {
                lat = pos.coords.latitude;
                lon = pos.coords.longitude;
                locationSpan.textContent = `📍 GPS Core Vector: [ ${lat.toFixed(4)}°N, ${lon.toFixed(4)}°E ]`;
                addLog(`Handshake completed. Core targeting parameters shifted.`, "ok");
            }, (err) => {
                locationSpan.textContent = "⚠️ Browser tracking rejected. Retaining static coordinates.";
                addLog(`GPS fault: ${err.message}`, "err");
            });
        }
    };

    // ----- Core Network Compute Engine -----
    async function executeDataCrunch() {
        if (!running) return;
        try {
            // FIXED URL: Explicitly forced over secure HTTPS encryption protocols
            const targetUrl = `https://open-meteo.com{lat}&longitude=${lon}&current_weather=true`;
            const response = await fetch(targetUrl);
            const dataset = await response.json();
            
            let networkReading = dataset.current_weather.temperature;
            // Generate minor fractional fluctuations so values don't stall
            let computedResult = parseFloat((networkReading + (Math.random() * 1.5 - 0.75)).toFixed(2));
            
            tempSpan.textContent = computedResult + ' °C';
            drawDial(computedResult);
            
            total++;
            
            // Rejection processing limits logic evaluation
            const isPayloadValid = computedResult < 34.5 || Math.random() > 0.3;
            if (isPayloadValid) {
                ripeCount++;
                addLog(`Frame Verified: Metric normal at ${computedResult}°C`, "ok");
            } else {
                addLog(`Anomaly Trigger: Temperature spike registered at ${computedResult}°C`, "err");
            }
            
            // Live-update interface card indices
            totalSpan.textContent = total;
            ripeSpan.textContent = ripeCount;
            rejectionSpan.textContent = (((total - ripeCount) / total) * 100).toFixed(1) + '%';
            energySpan.textContent = (total * 0.0034).toFixed(4) + ' kWh';
            
        } catch(error) {
            addLog(`Telemetry drop: Secure handshake failed: ${error.message}`, "err");
        }
    }

    // ----- Interactive Control Mappings -----
    document.getElementById('startBtn').onclick = () => {
        running = true;
        addLog('⚡ Processing real-time secure network calculations...');
        if (streamInterval) clearInterval(streamInterval);
        executeDataCrunch();
        streamInterval = setInterval(executeDataCrunch, 5000); 
    };

    document.getElementById('testBtn').onclick = () => {
        running = true;
        addLog('🔍 Querying single test packet context frame...');
        executeDataCrunch().then(() => running = false);
    };

    document.getElementById('resumeBtn').onclick = () => {
        if (running) {
            running = false;
            addLog('⏸️ Computing pipeline paused.');
        } else {
            running = true;
            addLog('▶️ Re-engaging operational stream analytics...');
            executeDataCrunch();
        }
    };

    document.getElementById('endBtn').onclick = () => {
        if (streamInterval) clearInterval(streamInterval);
        running = false;
        total = 0; ripeCount = 0;
        totalSpan.textContent = '0';
        ripeSpan.textContent = '0';
        rejectionSpan.textContent = '0%';
        energySpan.textContent = '0 kWh';
        tempSpan.textContent = '-- °C';
        drawDial(0);
        logDiv.innerHTML = '⏹️ Operational logs flushed. Node re-initialized.';
    };

    drawDial(0);
</script>
</body>
</html>
